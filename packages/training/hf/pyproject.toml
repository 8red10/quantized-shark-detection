[project]
name = "qsd-train-hf"
version = "0.1.0"
description = "Stage 2 (HuggingFace): train an object detector via the Transformers Trainer API and export to ONNX. Runs on cloud GPU."
authors = [
    { email = "22091223+8red10@users.noreply.github.com" }
]
requires-python = ">=3.11"
dependencies = [
    "qsd-common[onnx]",
    "transformers>=4.44",
    "torch>=2.2",
    "torchvision>=0.17",
    "datasets>=2.20",
    "accelerate>=0.33",
    "timm>=1.0",
    "pillow>=10",
]

[project.scripts]
train-hf = "qsd_train_hf:main"

[tool.uv.sources]
qsd-common = { path = "../../common", editable = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12.0"]
build-backend = "uv_build"
